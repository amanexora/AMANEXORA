<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AMA NEXORA Neon</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0A0A0A;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

.logo {
  text-align: center;
}

.logo h1 {
  font-size: 80px;
  letter-spacing: 8px;
  color: #00D4FF;
  position: relative;

  text-shadow:
    0 0 5px #00D4FF,
    0 0 10px #00D4FF,
    0 0 20px #00D4FF,
    0 0 40px #0A1AFF,
    0 0 80px #0A1AFF;

  animation: glowPulse 2s infinite alternate;
}

/* حركة النيون */
@keyframes glowPulse {
  from {
    text-shadow:
      0 0 5px #00D4FF,
      0 0 10px #00D4FF,
      0 0 20px #00D4FF,
      0 0 40px #0A1AFF;
  }
  to {
    text-shadow:
      0 0 10px #00D4FF,
      0 0 20px #00D4FF,
      0 0 40px #00D4FF,
      0 0 80px #0A1AFF;
  }
}

/* خط الضوء المتحرك */
.logo h1::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
  animation: sweep 3s infinite;
}

@keyframes sweep {
  0% { left: -100%; }
  100% { left: 100%; }
}

.logo p {
  margin-top: 10px;
  font-size: 22px;
  letter-spacing: 6px;
  color: #88eaff;

  text-shadow:
    0 0 5px #00D4FF,
    0 0 10px #00D4FF;

  animation: glowSub 2s infinite alternate;
}

@keyframes glowSub {
  from { opacity: 0.7; }
  to { opacity: 1; }
}

</style>
</head>

<body>

<div class="logo">
  <h1>AMA</h1>
  <p>NEXORA</p>
</div>

</body>
</html>
